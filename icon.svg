<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fundo com gradiente azul escuro (cor do app: #1A4B8C) -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A4B8C"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="phone-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#25D366"/>
      <stop offset="100%" stop-color="#128C7E"/>
    </linearGradient>
  </defs>

  <!-- Quadrado de fundo arredondado -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bg-grad)"/>

  <!-- Círculo de fundo branco semi-transparente para o ícone do WhatsApp -->
  <circle cx="256" cy="256" r="170" fill="#ffffff" opacity="0.95"/>

  <!-- Ícone de telefone (estilo WhatsApp) -->
  <g transform="translate(256, 256)">
    <!-- Balão de chat -->
    <path d="M -110 -100
             C -110 -120, -90 -140, -70 -140
             L 70 -140
             C 90 -140, 110 -120, 110 -100
             L 110 40
             C 110 60, 90 80, 70 80
             L -10 80
             L -40 120
             L -35 80
             L -70 80
             C -90 80, -110 60, -110 40
             Z"
          fill="url(#phone-grad)"/>

    <!-- Fone dentro do balão -->
    <path d="M -55 -75
             C -65 -75, -75 -65, -75 -50
             C -75 -25, -60 5, -30 35
             C 0 65, 30 80, 55 75
             C 70 70, 75 60, 75 50
             C 75 45, 72 40, 65 38
             L 40 30
             C 35 28, 30 30, 25 35
             L 18 45
             C 10 40, 0 30, -10 18
             C -20 8, -28 -2, -32 -10
             L -22 -18
             C -18 -22, -16 -28, -18 -33
             L -25 -58
             C -27 -65, -32 -68, -38 -68
             L -50 -73
             C -53 -74, -55 -75, -55 -75
             Z"
          fill="#ffffff"/>
  </g>

  <!-- Indicador de notificação (bolinha vermelha no canto) -->
  <circle cx="380" cy="140" r="42" fill="#C62828"/>
  <text x="380" y="158" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">!</text>
</svg>
